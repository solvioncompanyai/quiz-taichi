// Block boundaries [first question index in block]
const BLOCK_STARTS = [0, 3, 11, 19, 24];
const TOTAL = QUESTIONS.length; // 27

let currentQ = 0;
let scores = [];
let answers = {};
let multiSelected = {};
let totalScore = 0;

// ─── BLOCK DETECTION ─────────────────────────────────────────
function getBlockIndex(qIdx) {
  let b = 0;
  for(let i = BLOCK_STARTS.length - 1; i >= 0; i--) {
    if(qIdx >= BLOCK_STARTS[i]) { b = i; break; }
  }
  return b;
}

function updateHeader() {
  const pct = Math.round((currentQ / TOTAL) * 100);
  document.getElementById('q-counter').textContent = `Pergunta ${currentQ + 1} de ${TOTAL}`;
  document.getElementById('quiz-progress').style.width = pct + '%';
  document.getElementById('quiz-pct').textContent = pct + '%';
}

// ─── RENDER QUESTION ─────────────────────────────────────────
function renderQuestion(idx, direction = 'right') {
  const q = QUESTIONS[idx];
  const container = document.getElementById('question-container');

  // Exit animation
  if(container.firstChild) {
    container.firstChild.style.animation = direction === 'right'
      ? 'slideOutLeft 0.28s ease forwards'
      : 'slideOutRight 0.28s ease forwards';
    setTimeout(() => buildQuestion(q, container, direction), 280);
  } else {
    buildQuestion(q, container, direction);
  }

  updateHeader();
}

function buildQuestion(q, container, direction) {
  container.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'question-card';
  card.style.animation = direction === 'right'
    ? 'slideInRight 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards'
    : 'slideInLeft 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards';

  // Question number
  const qNum = document.createElement('div');
  qNum.className = 'question-number-badge';
  qNum.textContent = currentQ + 1;
  card.appendChild(qNum);

  // Question text
  const qText = document.createElement('div');
  qText.className = 'question-text';
  qText.textContent = q.text;
  card.appendChild(qText);

  // Subtitle
  if(q.subtitle) {
    const sub = document.createElement('div');
    sub.className = 'question-subtitle';
    sub.innerHTML = '📌 ' + q.subtitle;
    card.appendChild(sub);
  }

  // Multi-select hint
  if(q.multi) {
    const hint = document.createElement('div');
    hint.className = 'multi-select-hint';
    hint.innerHTML = '☑️ Selecione todas as opções que se aplicam';
    card.appendChild(hint);
    multiSelected[currentQ] = multiSelected[currentQ] || [];
  }

  // Options
  const optList = document.createElement('div');
  optList.className = 'options-list';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn ripple-container' + (q.multi ? ' multi' : '');

    if(q.multi) {
      // Checkbox
      const cb = document.createElement('div');
      cb.className = 'option-checkbox';
      cb.textContent = '✓';
      btn.appendChild(cb);
    } else {
      // Letter
      const letter = document.createElement('div');
      letter.className = 'option-letter';
      letter.textContent = String.fromCharCode(65 + i);
      btn.appendChild(letter);
    }

    // 3D Body image (if option has img field)
    if(opt.img) {
      const imgEl = document.createElement('img');
      imgEl.src = opt.img;
      imgEl.alt = opt.text;
      imgEl.className = 'option-img';
      imgEl.loading = 'lazy';
      btn.appendChild(imgEl);
    }

    // Text
    const span = document.createElement('span');
    span.style.flex = '1';
    span.textContent = (opt.icon ? opt.icon + ' ' : '') + opt.text;
    btn.appendChild(span);

    if(!q.multi) {
      // Check mark
      const check = document.createElement('span');
      check.className = 'option-check';
      check.textContent = '✓';
      btn.appendChild(check);
    }

    // Pre-select if already answered
    if(q.multi && multiSelected[currentQ] && multiSelected[currentQ].includes(i)) {
      btn.classList.add('selected');
    }
    if(!q.multi && answers[currentQ] === i) {
      btn.classList.add('selected');
    }

    // Ripple
    btn.addEventListener('click', function(e) {
      const rect = this.getBoundingClientRect();
      const circle = document.createElement('span');
      circle.className = 'ripple-circle';
      const size = Math.max(rect.width, rect.height);
      circle.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
      this.appendChild(circle);
      setTimeout(() => circle.remove(), 600);
    });

    if(q.multi) {
      btn.addEventListener('click', () => toggleMulti(btn, i, q));
    } else {
      btn.addEventListener('click', () => selectOption(btn, i, q));
    }

    optList.appendChild(btn);
  });

  card.appendChild(optList);

  // Multi next button
  if(q.multi) {
    const nextBtn = document.createElement('button');
    nextBtn.className = 'multi-next-btn';
    nextBtn.id = 'multi-next';
    const prevSelected = multiSelected[currentQ] && multiSelected[currentQ].length > 0;
    if(prevSelected) nextBtn.classList.add('active');
    nextBtn.innerHTML = 'Continuar <span>→</span>';
    nextBtn.addEventListener('click', () => {
      if(nextBtn.classList.contains('active')) advanceQuestion();
    });
    card.appendChild(nextBtn);
  }

  container.appendChild(card);
}

// ─── INTERACTION ─────────────────────────────────────────────
function selectOption(btn, idx, q) {
  // Deselect all
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  answers[currentQ] = idx;
  totalScore += q.options[idx].score;

  // Haptic
  if(navigator.vibrate) navigator.vibrate(40);

  // Check if we cross a block boundary
  const currentBlock = getBlockIndex(currentQ);
  const nextBlock    = currentQ + 1 < TOTAL ? getBlockIndex(currentQ + 1) : -1;

  setTimeout(() => {
    // Special case: transition from block 1 (PROBLEMA) → block 2 (IMPLICAÇÃO)
    // Show IMC calculator instead of generic unlock
    if(nextBlock === 2 && currentBlock === 1) {
      showIMCCalculator(() => {
        currentQ++;
        renderQuestion(currentQ);
      });
    } else if(nextBlock !== -1 && nextBlock !== currentBlock && BLOCKS[currentBlock].unlock) {
      showBlockUnlock(BLOCKS[currentBlock].unlock, () => {
        currentQ++;
        renderQuestion(currentQ);
      });
    } else {
      advanceQuestion();
    }
  }, 350);
}

function toggleMulti(btn, idx) {
  btn.classList.toggle('selected');
  if(!multiSelected[currentQ]) multiSelected[currentQ] = [];
  const sel = multiSelected[currentQ];
  const pos = sel.indexOf(idx);
  if(pos === -1) sel.push(idx);
  else sel.splice(pos, 1);

  const nextBtn = document.getElementById('multi-next');
  if(nextBtn) {
    nextBtn.classList.toggle('active', sel.length > 0);
  }
}

function advanceQuestion() {
  if(currentQ < TOTAL - 1) {
    const currentBlock = getBlockIndex(currentQ);
    const nextBlock    = getBlockIndex(currentQ + 1);

    if(nextBlock === 2 && currentBlock === 1) {
      showIMCCalculator(() => {
        currentQ++;
        renderQuestion(currentQ);
      });
    } else if(nextBlock !== currentBlock && BLOCKS[currentBlock].unlock) {
      showBlockUnlock(BLOCKS[currentBlock].unlock, () => {
        currentQ++;
        renderQuestion(currentQ);
      });
    } else {
      currentQ++;
      renderQuestion(currentQ);
    }
  } else {
    finishQuiz();
  }
}

// ─── BLOCK UNLOCK ANIMATION ───────────────────────────────────
function showBlockUnlock(unlock, callback) {
  const container = document.getElementById('question-container');
  container.innerHTML = '';

  // ✅ BUGFIX: garantir que o callback seja chamado APENAS UMA VEZ
  // O bug anterior: o botão chamava callback() e depois o setTimeout
  // também chamava, fazendo o quiz pular 2 perguntas de uma vez.
  let _called = false;
  const onceCb = () => {
    if (_called) return;
    _called = true;
    callback();
  };

  const wrap = document.createElement('div');
  wrap.className = 'block-unlock card';
  wrap.innerHTML = `
    <div class="block-unlock-icon">${unlock.icon}</div>
    <div class="block-unlock-title gradient-text">${unlock.title}</div>
    <div class="block-unlock-text">${unlock.text}</div>
    <button class="block-unlock-continue btn">
      Continuar <span>→</span>
    </button>
  `;
  container.appendChild(wrap);

  wrap.querySelector('button').addEventListener('click', onceCb);

  // Auto-advance after 3s — usa onceCb para evitar dupla execução
  setTimeout(onceCb, 3000);
}

function calcularIMC() {
  const alturaInput = parseFloat(document.getElementById('imc-altura').value);
  const pesoInput   = parseFloat(document.getElementById('imc-peso').value);

  if(!alturaInput || !pesoInput || alturaInput < 100 || alturaInput > 250 || pesoInput < 30 || pesoInput > 250) {
    // Shake inputs
    document.querySelectorAll('.imc-input-wrap').forEach(el => {
      el.style.animation = 'none';
      el.style.borderColor = 'rgba(239,68,68,0.6)';
      setTimeout(() => { el.style.borderColor = ''; }, 1500);
    });
    document.getElementById('imc-calc-btn').textContent = '⚠️ Preencha altura e peso corretamente';
    setTimeout(() => { document.getElementById('imc-calc-btn').textContent = 'Calcular meu IMC →'; }, 2000);

function drawIMCGauge(imc, activeColor) {
  const canvas = document.getElementById('imc-gauge');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H - 20;
  const radius = 100;
  const startAngle = Math.PI;
  const endAngle   = 2 * Math.PI;

  // Segments (IMC 10 → 40+)
  // Each segment covers a range mapped to the semicircle
  const segments = [
    { max: 18.5, color: '#60a5fa' },
    { max: 25,   color: '#34d399' },
    { max: 30,   color: '#fbbf24' },
    { max: 35,   color: '#f97316' },
    { max: 42,   color: '#ef4444' }
  ];

  const IMC_MIN = 10, IMC_MAX = 42;
  let prevAngle = startAngle;

  // Draw track
  segments.forEach(seg => {
    const segEnd = startAngle + ((seg.max - IMC_MIN) / (IMC_MAX - IMC_MIN)) * Math.PI;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, prevAngle, segEnd);
    ctx.strokeStyle = seg.color;
    ctx.lineWidth = 18;
    ctx.lineCap = 'butt';
    ctx.globalAlpha = 0.2;
    ctx.stroke();
    prevAngle = segEnd;
  });

  // Draw filled arc up to the user's IMC
  const clampedIMC = Math.max(IMC_MIN, Math.min(imc, IMC_MAX));
  const fillAngle = startAngle + ((clampedIMC - IMC_MIN) / (IMC_MAX - IMC_MIN)) * Math.PI;
  prevAngle = startAngle;
  ctx.globalAlpha = 1;

  segments.forEach(seg => {
    const segEnd = startAngle + ((seg.max - IMC_MIN) / (IMC_MAX - IMC_MIN)) * Math.PI;
    if(prevAngle >= fillAngle) return;
    const drawEnd = Math.min(segEnd, fillAngle);
    ctx.beginPath();
    ctx.arc(cx, cy, radius, prevAngle, drawEnd);
    ctx.strokeStyle = seg.color;
    ctx.lineWidth = 18;
    ctx.lineCap = 'butt';
    ctx.globalAlpha = 1;
    ctx.stroke();
    prevAngle = segEnd;
  });

  // Needle
  ctx.globalAlpha = 1;
  const needleAngle = startAngle + ((clampedIMC - IMC_MIN) / (IMC_MAX - IMC_MIN)) * Math.PI;
  const needleLen = radius - 10;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(
    cx + needleLen * Math.cos(needleAngle),
    cy + needleLen * Math.sin(needleAngle)
  );
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 8, 0, 2 * Math.PI);
  ctx.fillStyle = activeColor;
  ctx.fill();
  ctx.strokeStyle = '#080e1a';
  ctx.lineWidth = 2;
  ctx.stroke();

  // IMC min/max labels
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = '#94a3b8';
  ctx.font = '11px Inter, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('10', cx - radius - 8, cy + 4);
  ctx.textAlign = 'right';
  ctx.fillText('42+', cx + radius + 8, cy + 4);
  ctx.textAlign = 'center';
  ctx.fillText('NORMAL', cx, cy - radius - 8);
  ctx.globalAlpha = 1;
}

  sessionStorage.setItem('has_diagnosis', JSON.stringify(true));

  // Progress to 100%
  document.getElementById('quiz-progress').style.width = '100%';
  document.getElementById('quiz-pct').textContent = '100%';

  // Fade out and redirect
  document.body.style.transition = 'opacity 0.6s';
  document.body.style.opacity = '0';
  setTimeout(() => { window.location.href = 'loading.html'; }, 600);
}

// ─── INIT ─────────────────────────────────────────────────────
renderQuestion(0);
</script>
